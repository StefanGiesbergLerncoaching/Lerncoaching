# Netlify Konfiguration für Blitzlesen Trainer

[build]
  # Kein Build-Prozess nötig (statische Dateien)
  publish = "."

[[headers]]
  # Für alle Dateien
  for = "/*"
  [headers.values]
    # Security Headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # CORS für ES6 Modules (wichtig!)
    Access-Control-Allow-Origin = "*"

[[headers]]
  # JavaScript-Module benötigen korrekten MIME-Type
  for = "*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  # CSS
  for = "*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

# Redirects (optional, für spätere Features)
# [[redirects]]
#   from = "/old-path"
#   to = "/new-path"
#   status = 301